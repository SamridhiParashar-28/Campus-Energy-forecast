<!DOCTYPE html>
<html lang="en">
<head>

  <title>Energy Dashboard – Campus / Home</title>

  <!-- Reuse global styles + add dashboard-specific -->
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/dashboard.css" />

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>
<body>

  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Energy Monitor</h2>
        <p class="subtitle">Campus / Smart Home</p>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-link active"><i class="fas fa-gauge-high"></i> Dashboard</a>
        <a href="#" class="nav-link"><i class="fas fa-bolt"></i> Live Usage</a>

        <a href="../index.html" class="nav-link logout"><i class="fas fa-right-from-bracket"></i> Sign Out</a>

    <!-- Main content area -->
    <main class="main-content">

      <header class="page-header">
        <div class="welcome">
          <h1>Dashboard</h1>
          <p>Welcome back, <span id="current-user">Guest</span></p>
